<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header :: header('Internal Server Error')}"></head>
<body>
    <div class="glow-bg-blob blob-3"></div>

    <header>
        <div class="nav-container">
            <div class="logo" style="cursor: pointer;" onclick="location.href='/'">
                <i class="fa-solid fa-graduation-cap"></i> AI-PMS
            </div>
        </div>
    </header>

    <main class="auth-wrapper" style="min-height: calc(100vh - 200px); flex-direction:column; text-align:center;">
        <div class="auth-card" style="max-width:500px;">
            <h1 style="font-size: 5rem; background: linear-gradient(135deg, var(--accent-rose), #e11d48); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">500</h1>
            <h2 style="margin-top: 1rem; font-size: 1.5rem;">Internal Server Error</h2>
            <p style="color:var(--text-secondary); margin-top:0.5rem; margin-bottom:1.5rem;">The server encountered an unexpected error state. Please contact TPO support coordinates if this persists.</p>
            <button class="btn" onclick="location.href='/'">Return Home <i class="fa-solid fa-home"></i></button>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
