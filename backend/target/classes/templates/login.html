<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header :: header('Portal Login')}"></head>
<body>
    <div class="glow-bg-blob blob-1"></div>
    <div class="glow-bg-blob blob-2"></div>
    
    <header>
        <div class="nav-container">
            <div class="logo" style="cursor: pointer;" onclick="location.href='/'">
                <i class="fa-solid fa-graduation-cap"></i> AI-PMS
            </div>
            <div>
                <button class="btn btn-secondary" onclick="location.href='/register'">Register</button>
            </div>
        </div>
    </header>

    <main class="auth-wrapper">
        <div class="auth-card">
            <div style="text-align: center; margin-bottom: 2rem;">
                <h2 style="font-size: 2rem; background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800;"><i class="fa-solid fa-graduation-cap"></i> AI-PMS</h2>
                <p style="color: var(--text-secondary); margin-top: 0.5rem; font-size: 0.9rem;">Sign in to your account</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Login <i class="fa-solid fa-arrow-right-to-bracket"></i></button>
            </form>

            <div style="margin-top: 1.5rem; text-align: center; font-size: 0.85rem;">
                <a href="/forgot-password" style="color: var(--accent-blue); text-decoration: none;">Forgot password?</a>
            </div>
        </div>
    </main>

    <!-- Global Toast Alert Banner -->
    <div id="toast-banner" style="display: none;">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <span id="toast-icon"></span>
            <div style="flex: 1;">
                <h4 id="toast-title">Alert</h4>
                <p id="toast-desc">Message details here.</p>
            </div>
            <i class="fa-solid fa-times" onclick="window.hideToast()" style="cursor: pointer; color: var(--text-muted);"></i>
        </div>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
