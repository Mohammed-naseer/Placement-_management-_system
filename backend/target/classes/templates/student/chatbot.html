<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header :: header('Student AI Chatbot')}"></head>
<body>
    <div class="glow-bg-blob blob-2"></div>

    <header th:replace="~{fragments/navbar :: navbar}"></header>

    <div class="dashboard-container">
        <div th:replace="~{fragments/sidebar :: student-sidebar}"></div>

        <main class="main-content">
            <div class="glass-card">
                <h2>AI Advisor & Chat Support</h2>
                <p style="color:var(--text-secondary); margin-top:0.25rem; font-size:0.9rem;">Chat with AI Career Advisor or connect directly with Coordinators/Hiring Managers.</p>
                <div style="display:flex; gap:1rem; margin-top:1.5rem;">
                    <button class="btn" onclick="location.href='/ai/chatbot'"><i class="fa-solid fa-robot"></i> Open AI Career Chatbot</button>
                    <button class="btn btn-secondary" onclick="location.href='/ai/resume-analyzer'"><i class="fa-solid fa-calculator"></i> ATS Matcher</button>
                </div>
            </div>
        </main>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
