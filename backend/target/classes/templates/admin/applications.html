<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header :: header('Student Applications Tracker')}"></head>
<body>
    <div class="glow-bg-blob blob-2"></div>

    <header th:replace="~{fragments/navbar :: navbar}"></header>

    <div class="dashboard-container">
        <div th:replace="~{fragments/sidebar :: admin-sidebar}"></div>

        <main class="main-content">
            <div class="glass-card">
                <h2>Active Student Applications</h2>
                <p style="color:var(--text-secondary); margin-top:0.25rem;">Monitor overall recruitment status across multiple companies and departments.</p>
                
                <table style="margin-top:2rem;">
                    <thead>
                        <tr>
                            <th>App ID</th>
                            <th>Student Name</th>
                            <th>Job Drive</th>
                            <th>Company</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1</td>
                            <td>Lead Student Coordinator</td>
                            <td>Backend Engineer</td>
                            <td>TechCorp Inc.</td>
                            <td><span class="badge badge-approved">Applied</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
