<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header :: header('System Placement Analytics')}"></head>
<body>
    <div class="glow-bg-blob blob-1"></div>

    <header th:replace="~{fragments/navbar :: navbar}"></header>

    <div class="dashboard-container">
        <div th:replace="~{fragments/sidebar :: admin-sidebar}"></div>

        <main class="main-content">
            <div class="glass-card">
                <h2>Real-Time Placement Analytics</h2>
                <p style="color:var(--text-secondary); margin-top:0.25rem;">Explore recruitment stats, salary metrics, and branch counts.</p>
                
                <div class="analytics-chart-container" style="margin-top:2rem; display:flex; flex-direction:column; justify-content:center; align-items:center; border: 1px dashed var(--border-color);">
                    <i class="fa-solid fa-chart-line" style="font-size:3rem; color:var(--accent-cyan); margin-bottom:1rem;"></i>
                    <p style="font-size:1.1rem; font-weight:600;">Interactive Branch-wise Breakdown</p>
                    <p style="font-size:0.85rem; color:var(--text-muted); text-align:center; max-width:300px; margin-top:0.25rem;">IT: 88% Placed | CSE: 92% Placed | ECE: 74% Placed</p>
                </div>
            </div>
        </main>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
