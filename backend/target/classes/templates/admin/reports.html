<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header :: header('Placement Reports Compiler')}"></head>
<body>
    <div class="glow-bg-blob blob-3"></div>

    <header th:replace="~{fragments/navbar :: navbar}"></header>

    <div class="dashboard-container">
        <div th:replace="~{fragments/sidebar :: admin-sidebar}"></div>

        <main class="main-content">
            <div class="glass-card">
                <h2>Compile Placement Drive Statistics</h2>
                <p style="color:var(--text-secondary); margin-top:0.25rem;">Trigger real-time statistics sync and compile branches placement lists.</p>
                
                <form id="compile-report-form" style="margin-top: 1.5rem;">
                    <div class="form-group">
                        <label for="report-title">Report Title</label>
                        <input type="text" id="report-title" placeholder="e.g. 2026 Batch Final Statistics Summary" required>
                    </div>
                    <div class="form-group">
                        <label for="report-type">Compilation Scope / Filter</label>
                        <select id="report-type" required>
                            <option value="GENERAL">General System Compilation</option>
                            <option value="BRANCH_WISE">Branch Specific Breakdown</option>
                            <option value="SALARY_METRICS">Salary Bracket Statistics</option>
                        </select>
                    </div>
                    <button type="submit" class="btn" style="width:100%;">Sync & Compile Report <i class="fa-solid fa-sync"></i></button>
                </form>
            </div>

            <div class="glass-card">
                <h3>Compiled Reports Archives</h3>
                <div id="admin-reports-list" class="notification-list">
                    <p style="color:var(--text-muted); font-size:0.9rem; margin-top:1rem;">Checking compilation files...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Report Details Modal -->
    <div id="report-detail-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); backdrop-filter:blur(8px); align-items:center; justify-content:center; z-index:200;">
        <div class="auth-card" style="width:100%; max-width:560px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:1.5rem;">
                <h3><i class="fa-solid fa-file-invoice-dollar" style="color:var(--accent-cyan);"></i> Compiled Placement Metrics</h3>
                <i class="fa-solid fa-times" onclick="window.closeAdminModal('report-detail-modal')" style="cursor:pointer;"></i>
            </div>
            <div id="report-detail-modal-body">
                <!-- Injected via admin.js -->
            </div>
            <button class="btn btn-secondary" onclick="window.closeAdminModal('report-detail-modal')" style="width: 100%; margin-top: 1.5rem;">Dismiss Panel</button>
        </div>
    </div>

    <!-- Global Toast Alert Banner -->
    <div id="toast-banner" style="display: none;">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <span id="toast-icon"></span>
            <div style="flex: 1;">
                <h4 id="toast-title">Alert</h4>
                <p id="toast-desc">Message details here.</p>
            </div>
            <i class="fa-solid fa-times" onclick="window.hideToast()" style="cursor: pointer; color: var(--text-muted);"></i>
        </div>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <div th:replace="~{fragments/scripts :: scripts}"></div>
    <script src="/js/admin.js"></script>
</body>
</html>
