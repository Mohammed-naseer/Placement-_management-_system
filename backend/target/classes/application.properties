# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/pms_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration (Minimum 256-bit key)
pms.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
pms.jwt.expiration=86400000

# AI Configuration (Gemini API)
# Get a key from Google AI Studio and set it as an env variable or replace here
pms.ai.gemini.key=${GEMINI_API_KEY:mock_gemini_key_for_offline_use}
pms.ai.gemini.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent

# Mail Configuration (OTP and notifications)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:placement.system.demo@gmail.com}
spring.mail.password=${MAIL_PASSWORD:mock_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Cloudinary Configuration for Resume uploads
pms.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
pms.cloudinary.api-key=${CLOUDINARY_API_KEY:}
pms.cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Enable multipart file uploads for resume files
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Logging Configuration
logging.level.org.springframework.security=INFO
logging.level.com.pms=DEBUG
