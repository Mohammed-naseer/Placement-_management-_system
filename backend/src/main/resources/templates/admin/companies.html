<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header :: header('Partner Corporates')}"></head>
<body>
    <div class="glow-bg-blob blob-1"></div>

    <header th:replace="~{fragments/navbar :: navbar}"></header>

    <div class="dashboard-container">
        <div th:replace="~{fragments/sidebar :: admin-sidebar}"></div>

        <main class="main-content">
            <div class="glass-card">
                <h2>Registered Corporate Partners</h2>
                <p style="color:var(--text-secondary); margin-top:0.25rem;">Monitor partner website domains, active placements, and verification status.</p>
                
                <table style="margin-top:2rem;">
                    <thead>
                        <tr>
                            <th>Company ID</th>
                            <th>Company Name</th>
                            <th>Industry</th>
                            <th>Website</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1</td>
                            <td>TechCorp Inc.</td>
                            <td>IT Services</td>
                            <td><a href="https://techcorp.com" target="_blank" style="color:var(--accent-blue);">techcorp.com</a></td>
                            <td><span class="badge badge-approved">VERIFIED</span></td>
                        </tr>
                        <tr>
                            <td>2</td>
                            <td>PixelStudio</td>
                            <td>Design Agency</td>
                            <td><a href="https://pixelstudio.design" target="_blank" style="color:var(--accent-blue);">pixelstudio.design</a></td>
                            <td><span class="badge badge-pending">PENDING</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
