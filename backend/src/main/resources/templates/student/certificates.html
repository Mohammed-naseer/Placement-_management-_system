<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header :: header('Portfolio Certificates')}"></head>
<body>
    <div class="glow-bg-blob blob-1"></div>

    <header th:replace="~{fragments/navbar :: navbar}"></header>

    <div class="dashboard-container">
        <div th:replace="~{fragments/sidebar :: student-sidebar}"></div>

        <main class="main-content">
            <div class="glass-card">
                <button class="btn btn-secondary" onclick="location.href='/student/profile'" style="margin-bottom: 1rem;"><i class="fa-solid fa-arrow-left"></i> Portfolio Details</button>
                <h2>Register Certification</h2>
                
                <form id="student-certificate-form" style="margin-top: 1.5rem;">
                    <div class="form-group">
                        <label for="cert-name">Certificate Title</label>
                        <input type="text" id="cert-name" placeholder="e.g. AWS Cloud Practitioner" required>
                    </div>
                    <div class="form-group">
                        <label for="cert-org">Issuing Organization</label>
                        <input type="text" id="cert-org" placeholder="e.g. Amazon Web Services" required>
                    </div>
                    <div class="form-group">
                        <label for="cert-link">Verification URL</label>
                        <input type="url" id="cert-link" placeholder="e.g. https://credly.com/cert/...">
                    </div>
                    <button type="submit" class="btn" style="width: 100%;">Add Certificate <i class="fa-solid fa-plus"></i></button>
                </form>
            </div>

            <div class="glass-card">
                <h3>Registered Certificates</h3>
                <div id="certificates-list">
                    <p style="color:var(--text-muted); font-size:0.9rem; margin-top:1rem;">Checking credentials...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Global Toast Alert Banner -->
    <div id="toast-banner" style="display: none;">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <span id="toast-icon"></span>
            <div style="flex: 1;">
                <h4 id="toast-title">Alert</h4>
                <p id="toast-desc">Message details here.</p>
            </div>
            <i class="fa-solid fa-times" onclick="window.hideToast()" style="cursor: pointer; color: var(--text-muted);"></i>
        </div>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <div th:replace="~{fragments/scripts :: scripts}"></div>
    <script src="/js/student.js"></script>
</body>
</html>
