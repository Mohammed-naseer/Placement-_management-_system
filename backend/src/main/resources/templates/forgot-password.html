<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header :: header('Forgot Password')}"></head>
<body>
    <div class="glow-bg-blob blob-2"></div>
    
    <header>
        <div class="nav-container">
            <div class="logo" style="cursor: pointer;" onclick="location.href='/'">
                <i class="fa-solid fa-graduation-cap"></i> AI-PMS
            </div>
            <div>
                <button class="btn btn-secondary" onclick="location.href='/login'">Login</button>
            </div>
        </div>
    </header>

    <main class="auth-wrapper">
        <div class="auth-card">
            <div style="text-align: center; margin-bottom: 2rem;">
                <h2 style="font-size: 2rem; background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800;"><i class="fa-solid fa-graduation-cap"></i> AI-PMS</h2>
                <p style="color: var(--text-secondary); margin-top: 0.5rem; font-size: 0.9rem;">Reset portal password</p>
            </div>

            <form onsubmit="event.preventDefault(); window.showToast('Demo Alert', 'If account exists, reset guidelines will be emailed.', 'success');">
                <div class="form-group">
                    <label for="reset-email">Email Address</label>
                    <input type="email" id="reset-email" placeholder="Enter registered email" required>
                </div>
                <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Send Reset Link <i class="fa-solid fa-paper-plane"></i></button>
            </form>
        </div>
    </main>

    <!-- Global Toast Alert Banner -->
    <div id="toast-banner" style="display: none;">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <span id="toast-icon"></span>
            <div style="flex: 1;">
                <h4 id="toast-title">Alert</h4>
                <p id="toast-desc">Message details here.</p>
            </div>
            <i class="fa-solid fa-times" onclick="window.hideToast()" style="cursor: pointer; color: var(--text-muted);"></i>
        </div>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
